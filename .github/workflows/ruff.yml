name: Ruff

on: [pull_request, workflow_dispatch]

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: Ruff
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        # keep this pin in sync with the dev extra in pyproject.toml
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.14
      - name: Ruff lint
        run: ruff check --output-format=github yancc/ tests/
      - name: Ruff format check
        run: ruff format --check yancc/ tests/
